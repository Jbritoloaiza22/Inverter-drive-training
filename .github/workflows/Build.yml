name: STM32 Build

on:
  push:
    branches: [ "develop", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t stm32-build ./docker

      - name: Compile firmware
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            stm32-build \
            bash -c "cd /workspace/STM32CubeIDE/Debug && make"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: STM32CubeIDE/Debug/*.elf
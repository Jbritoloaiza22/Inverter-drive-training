name: Build STM32CubeIDE Project

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build with STM32CubeIDE Action
        uses: xanderhendriks/action-build-stm32cubeide@v15.0
        with:
          project-path: STM32CubeIDE/
          build-config: Debug

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-build
          path: |
            STM32CubeIDE/Debug/*.elf
            STM32CubeIDE/Debug/*.map
            STM32CubeIDE/Debug/*.list

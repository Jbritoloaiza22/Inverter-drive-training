name: Build STM32CubeIDE Project

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Instalar toolchain ARM
      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi make

      # 3. Compilar usando el Makefile que genera CubeIDE
      - name: Build firmware
        run: |
          cd firmware/inverter_drive
          make -j$(nproc)

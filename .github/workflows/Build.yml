name: Build STM32CubeIDE Project

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi make

      - name: Build Debug configuration
        run: |
          ls STM32CubeIDE
          cd STM32CubeIDE/Debug
          make -j$(nproc)

      - name: Upload ELF artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-elf
          path: firmware/inverter_drive/STM32CubeIDE/Debug/*.elf

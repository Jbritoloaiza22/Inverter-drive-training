name: Static Analysis

on:
  pull_request:
  push:
    branches:
      - '**'

jobs:
  static-analysis:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install tools
      run: |
        sudo apt update
        sudo apt install -y cppcheck clang-tidy

    - name: Run Cppcheck
      run: |
        cppcheck --enable=all --inconclusive --error-exitcode=0 --verbose \
        --suppress=missingIncludeSystem \
        --suppress=unusedFunction \
        --force .

    - name: Run clang-tidy
      run: |
        for file in $(find . -name "*.c"); do
        echo "Checking $file"
        clang-tidy "$file" --warnings-as-errors=* --quiet || exit 1
        done
